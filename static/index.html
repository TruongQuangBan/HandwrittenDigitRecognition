<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nhận diện chữ số viết tay</title>
  <style>
    :root {
      --bg: #101426;
      --panel: #171d33;
      --panel-soft: #202845;
      --text: #f5f7ff;
      --muted: #aab4d6;
      --line: rgba(255, 255, 255, 0.14);
      --blue: #4da3ff;
      --violet: #8b5cf6;
      --danger: #ff5c7a;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.38);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--text);
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      background:
        radial-gradient(circle at 20% 10%, rgba(77, 163, 255, 0.28), transparent 32%),
        radial-gradient(circle at 90% 20%, rgba(139, 92, 246, 0.24), transparent 28%),
        linear-gradient(135deg, #0c1020 0%, var(--bg) 52%, #18122d 100%);
    }

    .page {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 44px 0;
    }

    .header {
      display: grid;
      gap: 10px;
      margin-bottom: 28px;
    }

    .eyebrow {
      color: var(--blue);
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    h1 {
      max-width: 760px;
      margin: 0;
      font-size: 40px;
      line-height: 1.08;
    }

    .subtitle {
      max-width: 680px;
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(300px, 1fr) 360px;
      gap: 22px;
      align-items: stretch;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(23, 29, 51, 0.84);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .draw-panel {
      display: grid;
      gap: 18px;
      justify-items: center;
      padding: 28px;
    }

    .canvas-wrap {
      display: grid;
      place-items: center;
      width: 100%;
    }

    #canvas {
      width: 280px;
      height: 280px;
      display: block;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 22px;
      background: #000;
      box-shadow:
        0 22px 48px rgba(0, 0, 0, 0.48),
        0 0 0 8px rgba(255, 255, 255, 0.04);
      cursor: crosshair;
      touch-action: none;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      width: 100%;
    }

    button {
      min-width: 126px;
      border: 0;
      border-radius: 14px;
      padding: 12px 18px;
      color: var(--text);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: transform 150ms ease, box-shadow 150ms ease, opacity 150ms ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.62;
      transform: none;
    }

    #predictButton {
      background: linear-gradient(135deg, var(--blue), var(--violet));
      box-shadow: 0 14px 28px rgba(77, 163, 255, 0.22);
    }

    #clearButton {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    .side-panel {
      display: grid;
      gap: 16px;
      padding: 22px;
    }

    .preview-card,
    .result-card {
      display: grid;
      gap: 14px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(32, 40, 69, 0.72);
    }

    .label {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .preview-box {
      display: grid;
      place-items: center;
      min-height: 190px;
      border: 1px dashed rgba(255, 255, 255, 0.22);
      border-radius: 16px;
      background:
        linear-gradient(45deg, rgba(255, 255, 255, 0.04) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255, 255, 255, 0.04) 25%, transparent 25%),
        #090b12;
      background-size: 18px 18px;
    }

    #previewCanvas {
      width: 140px;
      height: 140px;
      image-rendering: pixelated;
      border-radius: 10px;
      background: #000;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.38);
    }

    .result-value {
      display: grid;
      place-items: center;
      min-height: 132px;
      border-radius: 18px;
      color: #fff;
      font-size: 72px;
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, rgba(77, 163, 255, 0.22), rgba(139, 92, 246, 0.24));
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .status {
      min-height: 24px;
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .status.error {
      color: var(--danger);
    }

    @media (max-width: 820px) {
      .page {
        width: min(100% - 24px, 560px);
        padding: 28px 0;
      }

      h1 {
        font-size: 32px;
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      .draw-panel {
        padding: 20px;
      }
    }

    @media (max-width: 380px) {
      #canvas {
        width: 260px;
        height: 260px;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="header">
      <div class="eyebrow">MNIST 28x28</div>
      <h1>Nhận diện chữ số viết tay</h1>
      <p class="subtitle">Vẽ một chữ số trên canvas, xem trước dữ liệu 28x28 được gửi lên model, rồi chạy dự đoán.</p>
    </section>

    <section class="workspace">
      <div class="panel draw-panel">
        <div class="canvas-wrap">
          <canvas id="canvas" width="280" height="280" aria-label="Canvas vẽ chữ số"></canvas>
        </div>
        <div class="actions">
          <button id="clearButton" type="button">Xóa</button>
          <button id="predictButton" type="button">Dự Đoán</button>
        </div>
      </div>

      <aside class="panel side-panel">
        <div class="preview-card">
          <p class="label">Ảnh 28x28 gửi lên model</p>
          <div class="preview-box">
            <canvas id="previewCanvas" width="28" height="28" aria-label="Ảnh xem trước 28x28"></canvas>
          </div>
        </div>

        <div class="result-card">
          <p class="label">Kết quả</p>
          <div id="predictionValue" class="result-value">-</div>
          <p id="status" class="status">Sẵn sàng dự đoán.</p>
        </div>
      </aside>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const previewCanvas = document.getElementById("previewCanvas");
    const previewCtx = previewCanvas.getContext("2d");
    const predictButton = document.getElementById("predictButton");
    const clearButton = document.getElementById("clearButton");
    const predictionValue = document.getElementById("predictionValue");
    const statusText = document.getElementById("status");
    let drawing = false;

    function setupDrawingContext() {
      ctx.lineWidth = 12;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = "white";
    }

    function resetCanvas() {
      ctx.fillStyle = "black";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      setupDrawingContext();

      previewCtx.fillStyle = "black";
      previewCtx.fillRect(0, 0, previewCanvas.width, previewCanvas.height);

      predictionValue.textContent = "-";
      statusText.textContent = "Sẵn sàng dự đoán.";
      statusText.classList.remove("error");
    }

    function getPosition(event) {
      const rect = canvas.getBoundingClientRect();
      const source = event.touches ? event.touches[0] : event;
      return {
        x: (source.clientX - rect.left) * (canvas.width / rect.width),
        y: (source.clientY - rect.top) * (canvas.height / rect.height)
      };
    }

    function startDrawing(event) {
      event.preventDefault();
      drawing = true;
      const pos = getPosition(event);
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
    }

    function draw(event) {
      if (!drawing) {
        return;
      }

      event.preventDefault();
      const pos = getPosition(event);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
    }

    function stopDrawing() {
      drawing = false;
      ctx.beginPath();
    }

    function buildModelInput() {
      const smallCanvas = document.createElement("canvas");
      smallCanvas.width = 28;
      smallCanvas.height = 28;
      const smallCtx = smallCanvas.getContext("2d");

      smallCtx.fillStyle = "black";
      smallCtx.fillRect(0, 0, 28, 28);
      smallCtx.drawImage(canvas, 0, 0, 28, 28);

      const imageData = smallCtx.getImageData(0, 0, 28, 28);
      const pixels = imageData.data;
      const image = [];

      for (let i = 0; i < pixels.length; i += 4) {
        const r = pixels[i];
        const g = pixels[i + 1];
        const b = pixels[i + 2];
        const grayscale = Math.round((r + g + b) / 3);
        image.push(grayscale);
        pixels[i] = grayscale;
        pixels[i + 1] = grayscale;
        pixels[i + 2] = grayscale;
        pixels[i + 3] = 255;
      }

      previewCtx.putImageData(imageData, 0, 0);
      console.log("Mang 784 gia tri gui len server:", image);
      return image;
    }

    async function predict() {
      const mangPixel = buildModelInput();
      predictButton.disabled = true;
      predictionValue.textContent = "...";
      statusText.textContent = "Đang gửi ảnh tới model.";
      statusText.classList.remove("error");

      try {
        const response = await fetch("/predict", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ image: mangPixel })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Có lỗi xảy ra.");
        }

        predictionValue.textContent = data.prediction;
        statusText.textContent = "Dự đoán hoàn tất.";
      } catch (error) {
        console.error("Loi khi goi API du doan:", error);
        predictionValue.textContent = "-";
        statusText.textContent = error.message || "Không thể kết nối server.";
        statusText.classList.add("error");
      } finally {
        predictButton.disabled = false;
      }
    }

    canvas.addEventListener("mousedown", startDrawing);
    canvas.addEventListener("mousemove", draw);
    window.addEventListener("mouseup", stopDrawing);
    canvas.addEventListener("mouseleave", stopDrawing);

    canvas.addEventListener("touchstart", startDrawing, { passive: false });
    canvas.addEventListener("touchmove", draw, { passive: false });
    canvas.addEventListener("touchend", stopDrawing);
    canvas.addEventListener("touchcancel", stopDrawing);

    clearButton.addEventListener("click", resetCanvas);
    predictButton.addEventListener("click", predict);

    resetCanvas();
  </script>
</body>
</html>
